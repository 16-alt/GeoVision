<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GeoVision</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

</head>

<body>

<header>

<h1>🌍 GeoVision</h1>

<p>منصة خرائط احترافية</p>

<div class="controls">

<input
type="text"
id="searchInput"
placeholder="اكتب اسم المدينة">

<button id="searchButton">
🔍 بحث
</button>

<button id="locationButton">
📍 موقعي
</button>

<br><br>

<select id="citySelect">

<option value="">اختر مدينة</option>

<option value="riyadh">الرياض</option>
<option value="jeddah">جدة</option>
<option value="makkah">مكة المكرمة</option>
<option value="madinah">المدينة المنورة</option>
<option value="dammam">الدمام</option>
<option value="jazan">جيزان</option>
<option value="abha">أبها</option>
<option value="asir">عسير</option>

</select>

</div>

</header>

<main>

<div id="info">

<h2>معلومات المدينة</h2>

<p>اختر مدينة أو اضغط على زر موقعي.</p>

</div>

<div id="map"></div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="data/cities.js"></script>

<script src="js/script.js"></script>

</body>

</html>
